<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Ladder</title>
    <link rel="stylesheet" href="./css/styles.css">
    <link rel="shortcut icon" href="./favicon.png" type="image/x-icon">
</head>

<body>
    <div id="menu">
        <div class="menu__container">
            <button id="playComputerBtn">1 vs Computer</button>
            <button id="playTwoPlayersBtn">Two Players</button>
            <button id="playThreePlayersBtn">Three Players</button>
            <button id="playFourPlayersBtn">Four Players</button>
        </div>
    </div>

    <!-- Scoreboard -->
    <div id="scoreboard" class="scoreboard">
        <h3>Score</h3>
        <div class="score-item">
            <span class="score-player red-text">🔴 Red</span>
            <span class="score-values">
                <span class="score-right">✓ <span id="red-right">0</span></span>
                <span class="score-wrong">✗ <span id="red-wrong">0</span></span>
                <span class="score-powerup">🛡️ <span id="red-powerup">0</span></span>
            </span>
        </div>
        <div class="score-item">
            <span class="score-player green-text">🟢 Green</span>
            <span class="score-values">
                <span class="score-right">✓ <span id="green-right">0</span></span>
                <span class="score-wrong">✗ <span id="green-wrong">0</span></span>
                <span class="score-powerup">🛡️ <span id="green-powerup">0</span></span>
            </span>
        </div>
        <div class="score-item">
            <span class="score-player blue-text">🔵 Blue</span>
            <span class="score-values">
                <span class="score-right">✓ <span id="blue-right">0</span></span>
                <span class="score-wrong">✗ <span id="blue-wrong">0</span></span>
                <span class="score-powerup">🛡️ <span id="blue-powerup">0</span></span>
            </span>
        </div>
        <div class="score-item">
            <span class="score-player yellow-text">🟡 Yellow</span>
            <span class="score-values">
                <span class="score-right">✓ <span id="yellow-right">0</span></span>
                <span class="score-wrong">✗ <span id="yellow-wrong">0</span></span>
                <span class="score-powerup">🛡️ <span id="yellow-powerup">0</span></span>
            </span>
        </div>
        <div class="score-item">
            <span class="score-player computer-text">💻 Computer</span>
            <span class="score-values">
                <span class="score-right">✓ <span id="computer-right">0</span></span>
                <span class="score-wrong">✗ <span id="computer-wrong">0</span></span>
                <span class="score-powerup">🛡️ <span id="computer-powerup">0</span></span>
            </span>
        </div>
    </div>

    <div id="playground">
        <div id="boardWrapper">
            <div id="gameBoard">
                <div class="player" id="redPlayerPiece">
                    <span class="player-name">Red</span>
                </div>
                <div class="player" id="greenPlayerPiece">
                    <span class="player-name">Green</span>
                </div>
                <div class="player" id="bluePlayerPiece">
                    <span class="player-name">Blue</span>
                </div>
                <div class="player" id="yellowPlayerPiece">
                    <span class="player-name">Yellow</span>
                </div>
    
                <div class="player" id="computerPlayerPiece">
                    <span class="player-name">Computer</span>
                </div>
    
                <div id="startingLinePlayers"></div>
                
        
                <div id="gameController">
                    <div id="dice"></div>
                    <div id="diceChoices">
                        <button class="dice-choice" data-roll="1" disabled>1</button>
                        <button class="dice-choice" data-roll="2" disabled>2</button>
                        <button class="dice-choice" data-roll="3" disabled>3</button>
                        <button class="dice-choice" data-roll="4" disabled>4</button>
                        <button class="dice-choice" data-roll="5" disabled>5</button>
                        <button class="dice-choice" data-roll="6" disabled>6</button>
                        <button class="dice-choice" data-roll="7" disabled>7</button>
                    </div>
                    <button id="undoMoveBtn" disabled>Undo</button>
                </div>
    
                <div id="gamePodium">
                </div>
            </div>
        </div>
    
        <div class="controller">
            <button class="play" id="red"></button>
            <button class="play" id="green"></button>
            <button class="play" id="blue"></button>
            <button class="play" id="yellow"></button>
            <button class="play" id="computer"></button>
            <button id="resetBtn">
                <img src="./icons/arrow-clockwise.svg" alt="Restart" title="Reset">
            </button>
    
        </div>
        <div id="log" style="display: none;"></div>
    </div>

    <script src="./js/constant.js"></script>
    <script src="./js/player.js"></script>
    <script src="./js/board.js"></script>
    <script src="./js/app.js"></script>
</body>

</html>
